# ============================================================
# DentaFlow — Production Nginx Configuration
# SSL с Let's Encrypt, gzip, заголовки безопасности
# ============================================================

upstream backend {
    server backend:8000;
}

# ── Редирект HTTP → HTTPS ────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Путь для проверки Let's Encrypt (certbot)
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Основной HTTPS-сервер ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # SSL-сертификаты Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/dentaflow/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dentaflow/privkey.pem;

    # Современные параметры SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Заголовки безопасности ────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip-сжатие ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── API backend ──────────────────────────────────────────────────
    location /api {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Таймауты для длинных запросов (AI-аналитика и т.д.)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── WebSocket ─────────────────────────────────────────────────────
    location /ws {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400s;
    }

    # ── Статические файлы с долгосрочным кешированием ─────────────────
    location /assets {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Frontend SPA ──────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Короткий кеш для index.html (обновления подхватываются быстро)
        location = /index.html {
            expires 5m;
            add_header Cache-Control "public, must-revalidate";
        }
    }
}
