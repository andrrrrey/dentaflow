id: dental_test
name: "Стоматология — простой тест"
description: "Простой тестовый диалог: приветствие → ответ пациента → реакция робота."

greeting: "Здравствуйте! Это стоматологическая клиника, звонит робот-ассистент. Удобно ли вам сейчас говорить?"

system_prompt: |
  Ты — вежливый робот-ассистент стоматологической клиники. Ведёшь короткий
  тестовый разговор на русском языке. Говори по 1–2 коротких предложения за реплику.
  Поздоровайся, спроси удобно ли говорить, затем задай пару простых вопросов
  (помнит ли пациент о своём приёме, всё ли в порядке, есть ли вопросы) и
  реагируй по смыслу на ответы собеседника. Если человек не хочет говорить —
  вежливо попрощайся. Не выдумывай лишних деталей, не давай медицинских советов.

steps:
  - id: start
    greeting: "Удобно ли вам сейчас говорить?"
    on_positive: chat
    on_negative: farewell
    on_unknown: chat
  - id: chat
    greeting: "Подскажите, у вас всё в порядке? Есть вопросы по приёму?"
    on_positive: chat
    on_negative: farewell
    on_objection: chat
    on_unknown: chat
  - id: farewell
    greeting: "Понял, спасибо за уделённое время. Хорошего дня!"
    is_final: true

farewell_positive: "Спасибо! Ждём вас в клинике. Всего доброго!"
farewell_negative: "Понял, спасибо за ответ. Хорошего дня!"
