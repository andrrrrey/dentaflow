# ============================================================
# DentaFlow — Production Docker Compose
# Запуск: docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes:
      - frontend_dist:/output
    command: sh -c "cp -rf /dist/. /output/ && echo 'Frontend deployed'"
    restart: "no"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - certbot_data:/etc/letsencrypt
      - frontend_dist:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    restart: always

  backend:
    build: ./backend
    env_file: .env
    volumes:
      - ./backend:/app          # live code mount — no rebuild needed for Python changes
    depends_on:
      - postgres
      - redis
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  celery_worker:
    build: ./backend
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    restart: always
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q default,ai,sync

  celery_beat:
    build: ./backend
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    restart: always
    command: celery -A app.tasks.celery_app beat --loglevel=info

  telegram_bot:
    build: ./backend
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    restart: always
    command: python -m app.services.telegram_bot

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: dentaflow
      POSTGRES_USER: dentaflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
  certbot_data:
  frontend_dist:
  frontend_node_modules:    # cached node_modules for fast frontend builds
