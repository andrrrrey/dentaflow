# ============================================================
# DentaFlow — Production Docker Compose
# Запуск: docker compose -f docker-compose.prod.yml up -d
# ============================================================

# Cap docker json-file logs so they can't fill the server disk.
# Without this the *-json.log files grow without bound (especially the
# chatty backend/celery services), which starves postgres of disk space.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes:
      - frontend_dist:/output
    command: sh -c "cp -rf /dist/. /output/ && echo 'Frontend deployed'"
    restart: "no"
    logging: *default-logging

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - certbot_data:/etc/letsencrypt
      - frontend_dist:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    restart: always
    logging: *default-logging

  backend:
    build: ./backend
    image: dentaflow-backend:latest
    env_file: .env
    environment:
      AICALLROBOT_URL: http://aicallrobot:8000
    depends_on:
      - postgres
      - redis
      - aicallrobot
    restart: always
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    logging: *default-logging

  aicallrobot:
    # ИИ обзвон (Тест TTS / Тест диалога / Скрипты диалога).
    # API-ключи (Yandex SpeechKit, OpenAI) приходят из DentaFlow в рантайме
    # (POST /api/v1/runtime-credentials), .env этого сервиса не требуется.
    build: ./aicallrobot
    restart: always
    volumes:
      - aicallrobot_data:/app/data
      - aicallrobot_kb:/app/knowledge_base
    logging: *default-logging

  asterisk:
    # Медиасервер ИИ-обзвона: исходящий SIP-транк до Novofon (регистрация) +
    # AudioSocket в aicallrobot:9092. SIP-настройки берутся из админки DentaFlow.
    # За NAT задайте EXTERNAL_IP в .env и при необходимости перейдите на host-сеть.
    build: ./asterisk
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "5060:5060/udp"
      - "10000-10020:10000-10020/udp"   # RTP (см. asterisk/etc/rtp.conf)
    depends_on:
      - backend
      - aicallrobot
    restart: always
    logging: *default-logging

  celery_worker:
    image: dentaflow-backend:latest
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: always
    # concurrency=4 so the nightly full sync (~150s) and the every-5-min
    # appointment sync don't block each other or the on-demand tasks.
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q default,ai,sync --concurrency=4
    logging: *default-logging

  # Dedicated worker for the heavy base-analysis (patient segments) recompute.
  # Isolated on its own queue so the 1Denta syncs can never starve it.
  celery_worker_segments:
    image: dentaflow-backend:latest
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: always
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q segments --concurrency=1
    logging: *default-logging

  celery_beat:
    image: dentaflow-backend:latest
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: always
    command: celery -A app.tasks.celery_app beat --loglevel=info
    logging: *default-logging

  telegram_bot:
    image: dentaflow-backend:latest
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: always
    command: python -m app.services.telegram_bot
    logging: *default-logging

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: dentaflow
      POSTGRES_USER: dentaflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    logging: *default-logging

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: always
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  certbot_data:
  frontend_dist:
  frontend_node_modules:    # cached node_modules for fast frontend builds
  aicallrobot_data:
  aicallrobot_kb:
