version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: dentaflow
      POSTGRES_USER: dentaflow
      POSTGRES_PASSWORD: dentaflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file: .env
    environment:
      AICALLROBOT_URL: http://aicallrobot:8000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  aicallrobot:
    # ИИ обзвон (Тест TTS / Тест диалога / Скрипты диалога).
    # API-ключи (Yandex SpeechKit, OpenAI) приходят из DentaFlow в рантайме.
    build: ./aicallrobot
    ports:
      - "8001:8000"
      - "9092:9092"   # AudioSocket-мост (Asterisk ⇄ WS) для телефонии
    volumes:
      - aicallrobot_data:/app/data
      - aicallrobot_kb:/app/knowledge_base

  asterisk:
    # Медиасервер для ИИ-обзвона: исходящий SIP-транк до Novofon + AudioSocket в aicallrobot.
    # SIP-настройки берутся из админки DentaFlow (раздел «Интеграции → Novofon»).
    build: ./asterisk
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "5060:5060/udp"
      - "10000-10020:10000-10020/udp"   # RTP (см. asterisk/etc/rtp.conf)
    depends_on:
      - backend
      - aicallrobot

  celery-worker:
    build: ./backend
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app worker --loglevel=info

  celery-beat:
    build: ./backend
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app beat --loglevel=info

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
  redis_data:
  aicallrobot_data:
  aicallrobot_kb:
