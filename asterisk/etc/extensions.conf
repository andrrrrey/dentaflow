; Dialplan исходящего ИИ-обзвона.
;
; Оркестратор DentaFlow инициирует звонок через ARI/AMI Originate:
;   - сначала создаёт сессию в aicallrobot (POST /api/v1/calls/start) → получает call_id (UUID);
;   - затем Originate:
;       Channel:  PJSIP/<номер_пациента>@novofon
;       Context:  ai-outbound
;       Exten:    <номер_пациента>
;       Variable: CALL_ID=<call_id из aicallrobot>
;
; Когда пациент отвечает, Asterisk выполняет диалплан ниже НА исходящем канале и
; через приложение AudioSocket заворачивает медиа звонка в наш мост
; (aicallrobot:9092), передавая ${CALL_ID} первым кадром (UUID). Мост открывает
; WS /ws/audio/${CALL_ID} — дальше весь диалог (ASR→LLM→TTS) ведёт aicallrobot.

[globals]
AUDIOSOCKET_HOST=aicallrobot
AUDIOSOCKET_PORT=9092

[ai-outbound]
exten => _X.,1,NoOp(AI outbound call_id=${CALL_ID} -> ${EXTEN})
 same => n,Set(audio_target=${AUDIOSOCKET_HOST}:${AUDIOSOCKET_PORT})
 ; Пишем запись разговора в общий том /recordings (его читает backend и отдаёт в UI).
 same => n,MixMonitor(/recordings/aicall-${CALL_ID}.wav)
 same => n,AudioSocket(${CALL_ID},${audio_target})
 same => n,Hangup()

; Тестовый контекст для ручной проверки моста без Novofon:
; originate Local/test@ai-test и AudioSocket поднимется на фиксированный UUID.
[ai-test]
exten => test,1,NoOp(AudioSocket bridge self-test)
 same => n,Answer()
 same => n,AudioSocket(11111111-1111-1111-1111-111111111111,${AUDIOSOCKET_HOST}:${AUDIOSOCKET_PORT})
 same => n,Hangup()
